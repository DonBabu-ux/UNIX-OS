name: Build Android APK/AAB

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Install Dependencies
        run: |
          cd react_native_ui && npm install
          
      - name: Build React Native Bundle
        run: |
          cd react_native_ui && npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output ../android_native_core/app/src/main/assets/index.android.bundle
          
      - name: Cache Gradle Packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: |
          cd android_native_core && ./gradlew assembleRelease
        env:
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.MYAPP_RELEASE_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.MYAPP_RELEASE_KEY_PASSWORD }}
          MYAPP_RELEASE_STORE_FILE: ${{ secrets.MYAPP_RELEASE_STORE_FILE }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.MYAPP_RELEASE_KEY_ALIAS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: smart-launcher-release
          path: android_native_core/app/build/outputs/apk/release/app-release.apk
